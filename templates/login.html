<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Απουσιολόγιο</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; }
        button { width: 96%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>Είσοδος Εκπαιδευτικού</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Σύνδεση</button>
    </div>

    <script>
        function login() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            fetch('/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded' // Αλλαγή σε form data
                },
                body: `username=${encodeURIComponent(u)}&password=${encodeURIComponent(p)}` // Αποστολή ως form data
            })
            .then(res => {
                // Ελέγχουμε αν ο server έκανε redirect (επιτυχής σύνδεση)
                if (res.redirected) {
                    window.location.href = res.url;
                    return;
                }
                // Αν δεν έγινε redirect, σημαίνει ότι υπάρχει μήνυμα λάθους (HTML)
                return res.text(); // Διαβάζουμε την απάντηση ως κείμενο (HTML)
            })
            .then(text => {
                if (text) { // Αν υπάρχει κείμενο, είναι το μήνυμα λάθους
                    alert(text.replace(/<[^>]*>?/gm, '')); // Εμφανίζουμε το μήνυμα, αφαιρώντας τυχόν HTML tags
                }
            });
        }
    </script>
</body>
</html>
